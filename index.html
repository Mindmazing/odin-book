<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Library</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <header>
      <h2 class="logo">Odin Library</h2>
      <button id="add-book-btn">Add Book</button>
    </header>
    <main>
      <div class="books-container"></div>
    </main>
    <footer>
      <p>
        Made by <a href="https://github.com" target="_blank">Fredy Villatoro</a>
      </p>
    </footer>

    <div id="new-book-popup">
      <div class="form-container">
        <h2>Add new book</h2>
        <form id="book-data">
          <div class="form-row">
            <div>
              <label for="book-title">Title</label>
              <input type="text" name="book-title" id="book-title" required />
            </div>
            <div>
              <label for="book-author">Author</label>
              <input type="text" name="book-author" id="book-auhtor" required />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label for="book-pages">Number of Pages</label>
              <input type="number" name="book-pages" id="book-pages" required />
            </div>
            <div>
              <label for="book-progress">Current Progress</label>
              <input
                type="number"
                name="book-progress"
                id="book-progress"
                required
              />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label for="book-description">Description</label>
              <textarea
                name="book-description"
                id="book-description"
                required
              ></textarea>
            </div>
          </div>
          <div class="form-row">
            <button type="submit" id="submit-add-book">Add Book</button>
            <button type="button" id="cancel-add">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
